<app-navbar></app-navbar>

<div class="container mt-4">
  <app-form-noticia (noticiaSalva)="carregarNoticias()"></app-form-noticia>

  <hr>

  <h3 class="mb-4">Mural de Notícias</h3>
  <div class="row">
    @for (item of noticias(); track item.id) {
      <div class="col-md-4">
        <app-card-noticia 
          [noticia]="item" 
          (noticiaExcluida)="carregarNoticias()">
        </app-card-noticia>
      </div>
    } @empty {
      <div class="col-12 text-center my-4">
        <p class="text-muted fs-5">Nenhuma notícia encontrada no momento. Seja o primeiro a criar!</p>
      </div>
    }
  </div>
</div>
