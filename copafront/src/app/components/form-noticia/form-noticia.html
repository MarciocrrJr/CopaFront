<div class="card p-4 mb-5 bg-light shadow-sm">
  <h3 class="mb-3 text-primary">Publicar noticia</h3>
  
  <form (ngSubmit)="cadastrarNoticia()">

    <div class="row">
      <div class="col-md-6 mb-3">
        <label class="form-label font-weight-bold">Autor</label>
        <input type="text" class="form-control" name="autor" [(ngModel)]="novaNoticia.autor">
      </div>
      
      <div class="col-md-6 mb-3">
        <label class="form-label">Data</label>
        <input type="date" class="form-control" name="data" [(ngModel)]="novaNoticia.data">
      </div>
    </div>

    <div class="row">
      <div class="col-md-6 mb-3">
        <label class="form-label font-weight-bold">Titulo</label>
        <input type="text" class="form-control" name="titulo" [(ngModel)]="novaNoticia.titulo">
      </div>
      
      <div class="col-md-6 mb-3">
        <label class="form-label">Subtitulo</label>
        <input type="text" class="form-control" name="subtitulo" [(ngModel)]="novaNoticia.subtitulo">
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label font-weight-bold">Conteudo</label>
      <textarea class="form-control" name="conteudo" rows="4" [(ngModel)]="novaNoticia.conteudo"></textarea>
    </div>

    <button type="submit" class="btn btn-success px-4">Publicar Notícia</button>
  </form>
</div>
