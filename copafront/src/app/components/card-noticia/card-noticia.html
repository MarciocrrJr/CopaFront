<div class="card my-3 shadow-sm" style="position: relative;">
  
  <button 
    type="button" 
    class="btn btn-danger btn-sm"
    (click)="solicitarExclusao()"
    style="position: absolute; top: 10px; right: 10px; z-index: 10; padding: 2px 8px; font-weight: bold;"
    title="Excluir notícia">
    Excluir
  </button>

  <div class="card-body">
    <h5 class="card-title pe-5">{{ noticia.titulo }}</h5>
    <h6 class="card-subtitle mb-2 text-muted">{{ noticia.subtitulo }}</h6>
    <p class="card-text">{{ noticia.conteudo }}</p>
    
    <div class="card-footer bg-transparent border-top-0 p-0 d-flex justify-content-between">
      <small class="text-muted">Por: {{ noticia.autor }}</small>
      <small class="text-muted">{{ noticia.data | date:'dd/MM/yyyy' }}</small>
    </div>
  </div>
</div>
