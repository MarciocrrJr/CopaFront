<div class="card h-100 shadow-sm custom-card" style="position: relative; border-left: 5px solid #002776; border-top: none; border-right: none; border-bottom: none; border-radius: 6px; background-color: #ffffff;">
  
  <button 
    type="button" 
    class="btn btn-sm btn-danger"
    (click)="abrirConfirmacao()"
    style="position: absolute; top: 10px; right: 10px; z-index: 9; padding: 2px 8px; font-size: 11px; font-weight: bold; border-radius: 4px;"
    title="Excluir notícia">
    Deletar
  </button>

  <div class="card-body d-flex flex-column" style="padding: 20px;">
    <h5 class="card-title pe-5 fw-bold text-dark" style="font-size: 18px; margin-bottom: 6px;">
      {{ noticia.titulo }}
    </h5>
    <h6 class="card-subtitle mb-3 text-muted italic" style="font-size: 14px; font-style: italic;">
      {{ noticia.subtitulo }}
    </h6>
    <p class="card-text text-secondary flex-grow-1" style="font-size: 15px; line-height: 1.5;">
      {{ noticia.conteudo }}
    </p>
    
    <div class="card-footer bg-transparent border-top border-light pt-3 px-0 pb-0 d-flex justify-content-between align-items-center" style="font-size: 13px;">
      <span class="badge bg-light text-dark px-2 py-1">{{ noticia.autor }}</span>
      <span class="text-muted fw-semibold">{{ noticia.data | date:'dd/MM/yyyy' }}</span>
    </div>
  </div>

  @if (exibindoModalSenha) {
    <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 39, 118, 0.95); z-index: 99; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 15px; border-radius: 6px; animation: fadeIn 0.2s ease;">
      
      <div class="text-center w-100" style="max-width: 260px;">
        <h6 class="text-white mb-2 fw-bold">Confirme a exclusão</h6>
        <p class="text-white-50 mb-3" style="font-size: 12px;">use senha de administrador:</p>
        
        <input 
          type="password" 
          class="form-control form-control-sm text-center mb-3" 
          [(ngModel)]="senhaDigitada"
          placeholder="Senha..." 
          style="border-radius: 4px; border: 2px solid #ffdf00;"
          (keyup.enter)="confirmarExclusao()"> <div class="d-flex gap-2 justify-content-center">
          <button type="button" class="btn btn-sm btn-light fw-bold" style="font-size: 12px; padding: 4px 12px;" (click)="fecharConfirmacao()">
            Cancelar
          </button>
          <button type="button" class="btn btn-sm btn-danger fw-bold" style="font-size: 12px; padding: 4px 12px; background-color: #dc3545;" (click)="confirmarExclusao()">
            Deletar
          </button>
        </div>
      </div>

    </div>
  }
</div>
